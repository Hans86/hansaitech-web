name: CI — Lint & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

jobs:
  lint-html:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML files
        run: npm run lint:html

  lint-css:
    name: CSS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS
        run: npm run lint:css

  check-links:
    name: Link Check
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start local server
        run: node serve.mjs &
        env:
          PORT: 5500

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:5500 --timeout 15000

      - name: Check internal links
        run: npm run check:links
