<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hansaitech 狠賽科技 — AI 導入、客製軟體開發與企業數位轉型。即將到來。" />
  <title>Hansaitech 狠賽科技 — 即將到來</title>
  <link rel="icon" href="./assets/icons/hansaitech_icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060d1a; --brand: #3b82f6; --accent: #06b6d4;
      --text: #e2e8f0; --muted: #8ba3c7;
      --gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif; overflow: hidden; }

    .stars { position: fixed; inset: 0; pointer-events: none; }
    .star { position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--d) ease-in-out infinite alternate; }
    @keyframes twinkle {
      from { opacity: var(--min); transform: scale(1); }
      to   { opacity: var(--max); transform: scale(1.5); }
    }

    .aurora { position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 90% 60% at 15% 10%, rgba(59,130,246,0.1) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 85% 20%, rgba(6,182,212,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 95%, rgba(99,102,241,0.06) 0%, transparent 60%);
      animation: auroraShift 20s ease-in-out infinite alternate; }
    @keyframes auroraShift {
      0% { opacity:.6; transform:scale(1); } 50% { opacity:1; transform:scale(1.04); } 100% { opacity:.7; transform:scale(1); }
    }

    .grid { position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 70px 70px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 0%, transparent 80%); }

    .page { position: relative; z-index: 10; height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 2rem; }

    .logo-wrap { display: flex; align-items: center; gap: .9rem;
      margin-bottom: 2rem; animation: fadeUp .8s ease both; }
    .logo-icon { width: 52px; height: 52px; object-fit: contain; border-radius: 14px;
      filter: drop-shadow(0 0 18px rgba(59,130,246,.55)); }
    .logo-text { font-size: 1.25rem; font-weight: 800; letter-spacing: -.02em;
      background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .badge { display: inline-flex; align-items: center; gap: .5rem;
      padding: .38rem 1rem; border-radius: 999px;
      background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.25);
      font-size: .82rem; font-weight: 700; color: #93c5fd;
      margin-bottom: 1.4rem; animation: fadeUp .8s .1s ease both; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: blink 1.8s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.3;transform:scale(.7);} }

    h1 { font-size: clamp(3rem,9vw,6rem); font-weight: 900; line-height: 1.1;
      letter-spacing: -.03em; margin-bottom: 1rem; animation: fadeUp .8s .2s ease both; }
    .gradient-text { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sub-headline { display: block; font-size: .52em; color: var(--muted); font-weight: 600; margin-top: .3rem; }

    .subtitle { font-size: clamp(.95rem,2.3vw,1.15rem); color: var(--muted);
      max-width: 480px; line-height: 1.7; margin-bottom: 2.4rem; animation: fadeUp .8s .3s ease both; }

    .countdown { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      margin-bottom: 2.6rem; animation: fadeUp .8s .4s ease both; }
    .count-box { background: rgba(12,22,40,.75); border: 1px solid rgba(99,179,237,.14);
      border-radius: 16px; padding: 1rem 1.3rem; min-width: 72px; backdrop-filter: blur(12px); }
    .count-num { font-size: 2rem; font-weight: 800; line-height: 1;
      background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      font-variant-numeric: tabular-nums; }
    .count-label { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-top: .3rem; }

    .notify-form { display: flex; gap: .6rem; flex-wrap: wrap; justify-content: center; animation: fadeUp .8s .5s ease both; }
    .notify-input { padding: .75rem 1.1rem; border-radius: 999px;
      border: 1.5px solid rgba(99,179,237,.2); background: rgba(12,22,40,.65);
      color: var(--text); font-size: .95rem; width: 260px; outline: none;
      backdrop-filter: blur(8px); transition: border-color .2s; font-family: inherit; }
    .notify-input::placeholder { color: var(--muted); }
    .notify-input:focus { border-color: var(--brand); }
    .notify-btn { padding: .75rem 1.5rem; border-radius: 999px;
      background: var(--gradient); color: #fff; font-weight: 700; font-size: .95rem;
      border: none; cursor: pointer; box-shadow: 0 4px 18px rgba(59,130,246,.35);
      transition: transform .2s, box-shadow .2s; font-family: inherit; }
    .notify-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,.5); }
    .notify-success { display: none; color: #86efac; font-weight: 600; font-size: .93rem; margin-top: .6rem; }

    .admin-link { position: fixed; bottom: 1.5rem; right: 1.8rem; font-size: .75rem;
      color: rgba(139,163,199,.28); text-decoration: none; transition: color .25s; z-index: 20; }
    .admin-link:hover { color: var(--muted); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(22px);} to{opacity:1;transform:translateY(0);} }

    @media (max-width:480px) {
      .count-box { min-width:58px; padding:.7rem .9rem; }
      .count-num { font-size:1.6rem; }
      .notify-input { width:100%; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="aurora"></div>
<div class="grid"></div>

<div class="page">
  <div class="logo-wrap">
    <img class="logo-icon" src="./assets/icons/hansaitech_icon.png" alt="Hansaitech" />
    <span class="logo-text">Hansaitech 狠賽科技</span>
  </div>

  <div class="badge">
    <span class="badge-dot"></span>
    AI · 軟體開發 · 數位轉型
  </div>

  <h1>
    <span class="gradient-text">即將到來</span>
    <span class="sub-headline">驅動未來的科技力量</span>
  </h1>

  <p class="subtitle">
    我們正在打造全新體驗，即將與您見面。<br />
    留下 Email，第一時間收到上線通知。
  </p>

  <div class="countdown">
    <div class="count-box"><div class="count-num" id="cd-days">00</div><div class="count-label">天</div></div>
    <div class="count-box"><div class="count-num" id="cd-hours">00</div><div class="count-label">時</div></div>
    <div class="count-box"><div class="count-num" id="cd-mins">00</div><div class="count-label">分</div></div>
    <div class="count-box"><div class="count-num" id="cd-secs">00</div><div class="count-label">秒</div></div>
  </div>

  <form class="notify-form" id="notifyForm">
    <input class="notify-input" type="email" placeholder="your@email.com" required />
    <button class="notify-btn" type="submit">通知我</button>
  </form>
  <div class="notify-success" id="notifySuccess">✓ 已收到，上線時我們會通知您！</div>
</div>

<a class="admin-link" href="/login">管理者登入</a>

<script>
  // Stars
  const el = document.getElementById("stars");
  for (let i=0;i<130;i++){
    const s=document.createElement("div"); s.className="star";
    const sz=Math.random()*2.4+0.3;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--min:${(Math.random()*.12+.04).toFixed(2)};--max:${(Math.random()*.55+.25).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s;`;
    el.appendChild(s);
  }
  // Countdown
  const TARGET=new Date("2026-06-01T00:00:00+08:00");
  const pad=n=>String(n).padStart(2,"0");
  function tick(){
    const d=TARGET-Date.now();
    if(d<=0){["days","hours","mins","secs"].forEach(id=>document.getElementById("cd-"+id).textContent="00");return;}
    document.getElementById("cd-days").textContent=pad(Math.floor(d/86400000));
    document.getElementById("cd-hours").textContent=pad(Math.floor(d%86400000/3600000));
    document.getElementById("cd-mins").textContent=pad(Math.floor(d%3600000/60000));
    document.getElementById("cd-secs").textContent=pad(Math.floor(d%60000/1000));
  }
  tick(); setInterval(tick,1000);
  // Notify
  document.getElementById("notifyForm").addEventListener("submit",e=>{
    e.preventDefault();
    document.getElementById("notifyForm").style.display="none";
    document.getElementById("notifySuccess").style.display="block";
  });
</script>
</body>
</html>
