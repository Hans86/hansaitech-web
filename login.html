<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者登入 — Hansaitech</title>
  <link rel="icon" href="./assets/icons/hansaitech_icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060d1a; --surface: #0c1628; --brand: #3b82f6; --accent: #06b6d4;
      --text: #e2e8f0; --muted: #8ba3c7; --border: rgba(99,179,237,0.14);
      --gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif; }

    .stars { position: fixed; inset: 0; pointer-events: none; }
    .star { position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--d) ease-in-out infinite alternate; }
    @keyframes twinkle {
      from { opacity: var(--min); } to { opacity: var(--max); }
    }
    .aurora { position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(59,130,246,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 70% 70%, rgba(6,182,212,0.06) 0%, transparent 60%); }

    .page { position: relative; z-index: 10; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 2rem; }

    .card { background: rgba(12,22,40,0.8); border: 1px solid var(--border);
      border-radius: 22px; padding: 2.4rem; width: 100%; max-width: 400px;
      backdrop-filter: blur(20px); animation: fadeUp .6s ease both; }

    .logo-wrap { display: flex; align-items: center; gap: .75rem;
      justify-content: center; margin-bottom: 1.8rem; }
    .logo-icon { width: 42px; height: 42px; object-fit: contain; border-radius: 10px;
      filter: drop-shadow(0 0 12px rgba(59,130,246,.5)); }
    .logo-text { font-size: 1.1rem; font-weight: 800;
      background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    h1 { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: .4rem; }
    .desc { text-align: center; font-size: .88rem; color: var(--muted); margin-bottom: 1.8rem; }

    .error-msg { display: none; background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3);
      border-radius: 10px; padding: .7rem 1rem; font-size: .87rem; color: #fca5a5;
      margin-bottom: 1.2rem; text-align: center; }
    .error-msg.show { display: block; }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: .4rem; }
    input { width: 100%; padding: .78rem 1rem; border-radius: 12px;
      border: 1.5px solid var(--border); background: rgba(6,13,26,.6);
      color: var(--text); font-size: .95rem; font-family: inherit; outline: none;
      transition: border-color .2s, box-shadow .2s; }
    input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }

    .submit-btn { width: 100%; padding: .85rem; border-radius: 999px;
      background: var(--gradient); color: #fff; font-weight: 700; font-size: 1rem;
      border: none; cursor: pointer; box-shadow: 0 4px 18px rgba(59,130,246,.35);
      transition: transform .2s, box-shadow .2s; font-family: inherit; margin-top: .4rem; }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,.5); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .back-link { display: block; text-align: center; margin-top: 1.2rem;
      font-size: .85rem; color: var(--muted); text-decoration: none; transition: color .2s; }
    .back-link:hover { color: var(--accent); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="aurora"></div>

<div class="page">
  <div class="card">
    <div class="logo-wrap">
      <img class="logo-icon" src="./assets/icons/hansaitech_icon.png" alt="Hansaitech" />
      <span class="logo-text">Hansaitech</span>
    </div>

    <h1>管理者登入</h1>
    <p class="desc">請輸入帳號與密碼以繼續</p>

    <div class="error-msg" id="errorMsg">帳號或密碼錯誤，請再試一次。</div>

    <form method="POST" action="/login" id="loginForm">
      <div class="form-group">
        <label for="username">帳號</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="submit-btn" type="submit" id="submitBtn">登入</button>
    </form>

    <a class="back-link" href="/">← 回到首頁</a>
  </div>
</div>

<script>
  // Stars
  const el = document.getElementById("stars");
  for(let i=0;i<60;i++){
    const s=document.createElement("div"); s.className="star";
    const sz=Math.random()*1.8+0.3;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--min:${(Math.random()*.1+.03).toFixed(2)};--max:${(Math.random()*.4+.15).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(1)}s;`;
    el.appendChild(s);
  }
  // Show error if ?error=1
  if(new URLSearchParams(location.search).get("error")==="1"){
    document.getElementById("errorMsg").classList.add("show");
  }
  // Disable button on submit
  document.getElementById("loginForm").addEventListener("submit",()=>{
    const btn=document.getElementById("submitBtn");
    btn.disabled=true; btn.textContent="登入中...";
  });
</script>
</body>
</html>
